<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <title>ZogQuiz Overlay - Manche 5</title>
    <link rel="stylesheet" href="css/overlay-common.css" />
    <link rel="stylesheet" href="css/overlay-round5.css" />
  </head>
  <body class="overlay-page">
    <main class="overlay-root overlay-round5" aria-live="polite">

    <script type="module" src="js/overlay-round5.js"></script>
