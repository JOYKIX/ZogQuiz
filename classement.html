<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZogQuiz - Classement</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app-shell guest-shell">
      <header class="hero card">
        <p class="eyebrow">Live ranking</p>
        <h1>Scoreboard Studio</h1>
        <p class="muted">Classement en direct des participants et viewers, prêt pour l'affichage stream.</p>
      </header>

      <section class="scoreboard-grid">
        <article class="card panel scoreboard-card">
          <h2>Participants</h2>
          <ul id="participants-leaderboard" class="leaderboard"></ul>
        </article>

        <article class="card panel scoreboard-card">
          <h2>Viewers</h2>
          <ul id="viewers-leaderboard" class="leaderboard"></ul>
        </article>
      </section>
    </main>

    <script type="module" src="js/classement.js"></script>
  </body>
</html>
