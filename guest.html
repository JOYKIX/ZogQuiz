<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZogQuiz Guest</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app-shell guest-shell">
      <section id="guest-round1" class="guest-round stack">
        <section class="card panel">
          <p class="eyebrow">Manche 1</p>
          <h1>Buzzer</h1>
          <form id="guest-form" class="stack">
            <label>Code
              <input id="guest-code" required maxlength="8" />
            </label>
            <label>Pseudo
              <input id="guest-nickname" required maxlength="24" />
            </label>
            <button type="submit" class="btn btn-primary">Se connecter</button>
          </form>
          <p id="guest-message" class="message"></p>
        </section>

        <section id="buzzer-panel" class="card panel hidden">
          <h2 id="guest-title"></h2>
          <button id="buzz-btn" class="buzz btn btn-primary">BUZZER</button>
          <p id="buzz-feedback" class="message"></p>
        </section>
      </section>

      <section id="guest-round2" class="guest-round hidden">
        <section class="card panel guest-image-card">
          <p class="eyebrow">Manche 2</p>
          <img id="m2-live-image" class="guest-image hidden" alt="Question manche 2" />
          <p id="m2-empty" class="guest-empty">Aucune image active</p>
        </section>
      </section>

      <section id="guest-round3" class="guest-round hidden stack">
        <section class="card panel">
          <h2>Manche 3</h2>
          <p id="m3-guest-status" class="message">En attente.</p>
          <p id="m3-guest-player" class="muted">Joueur actif : —</p>
          <p id="m3-guest-theme" class="muted">Thème actif : —</p>
        </section>

        <section class="card panel">
          <h3>Choix du thème</h3>
          <p id="m3-guest-help" class="muted">Seul le joueur actif peut choisir.</p>
          <div id="m3-theme-buttons" class="row"></div>
        </section>
      </section>

      <section id="guest-round4" class="guest-round hidden stack">
        <section class="card panel">
          <h2>Manche 4 · Codenames</h2>
          <p id="m4-guest-status" class="message">En attente du lancement.</p>
          <p id="m4-guest-clue" class="muted">Indice : —</p>
          <p id="m4-guest-phase" class="muted">Phase : 1/3</p>
        </section>
        <section class="card panel">
          <div id="m4-guest-grid" class="m4-grid"></div>
        </section>
      </section>
    </main>

    <script type="module" src="js/guest.js"></script>
  </body>
</html>
